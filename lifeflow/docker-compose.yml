version: '3.8'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lifeflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lifeflow_prod}
      POSTGRES_USER: ${DB_USER:-lifeflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lifeflow} -d ${DB_NAME:-lifeflow_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeflow_net

  # ─── Redis Cache ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lifeflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeflow_net

  # ─── Backend API ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeflow_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_NAME: ${DB_NAME:-lifeflow_prod}
      DB_USER: ${DB_USER:-lifeflow}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      DB_HOST: postgres
      DB_PORT: 5432
      USE_SQLITE: "false"
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_minimum_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_min_32}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-price_test_monthly}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY:-price_test_yearly}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5000:5000"
    volumes:
      - backend_logs:/app/logs
    networks:
      - lifeflow_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Frontend Web App ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifeflow_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:5000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
    ports:
      - "3000:3000"
    networks:
      - lifeflow_net

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lifeflow_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - lifeflow_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  lifeflow_net:
    driver: bridge
