name: lifeflow
description: LifeFlow - مساعدك الشخصي الذكي بالعربية
# Version follows semantic versioning
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1

  # Networking
  http: ^1.2.0
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2

  # UI Components
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.3

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Date/Time
  table_calendar: ^3.1.1
  hijri: ^2.0.1

  # Voice & Speech (mocked in demo)
  speech_to_text: ^6.6.0

  # Icons
  flutter_svg: ^2.0.9
  iconsax: ^0.0.8

  # Haptic feedback
  vibration: ^1.9.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # App fonts - Arabic support
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
